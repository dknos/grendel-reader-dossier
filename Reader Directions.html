<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project Grendel — Reader UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=IM+Fell+English:ital@0;1&family=IM+Fell+DW+Pica:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background: #1f2024; font-family: -apple-system, system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data/content.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="directions/dossier.jsx"></script>
<script type="text/babel" src="directions/editorial.jsx"></script>
<script type="text/babel" src="directions/bone-amber.jsx"></script>

<script type="text/babel">
const { useState } = React;

function PhoneShell({ children, dark, label }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 14 }}>
      <IOSDevice width={402} height={874} dark={dark}>
        {children}
      </IOSDevice>
    </div>
  );
}

function ThemeToggle({ dark, setDark }) {
  return (
    <div style={{
      position:'absolute', top: 14, right: 14, zIndex: 100,
      display:'flex', gap: 6,
      background: 'rgba(255,255,255,0.85)',
      backdropFilter:'blur(10px)',
      padding: 4, borderRadius: 99,
      boxShadow: '0 4px 12px rgba(0,0,0,0.15)',
      fontFamily:'system-ui, sans-serif',
    }}>
      {['light','dark'].map(m=>(
        <button key={m} onClick={()=>setDark(m==='dark')} style={{
          padding:'6px 12px', borderRadius:99, border:'none', cursor:'pointer',
          fontSize:11, fontWeight: 600, letterSpacing:'0.05em', textTransform:'uppercase',
          background: (dark === (m==='dark')) ? '#111' : 'transparent',
          color: (dark === (m==='dark')) ? '#fff' : '#666',
        }}>{m}</button>
      ))}
    </div>
  );
}

function DirectionGroup({ dirKey, dir, defaultDark = false }) {
  const [dark, setDark] = useState(defaultDark);
  const [activeTooltip, setActiveTooltip] = useState(null);
  const [typeMenuOpen, setTypeMenuOpen] = useState(false);
  const [activeTooltip2, setActiveTooltip2] = useState('Isla Nublar'); // pre-opened in second reader board
  const settings = { fontSize: 16.5, lineHeight: 1.6 };

  const labels = {
    dossier:   { name: 'Dossier',           sub: 'Declassified field-file. Mono + serif. Stamps, redactions, perforated edges.' },
    editorial: { name: 'Editorial Literary', sub: 'Magazine-grade typography. Display italic serif, photo-led, generous whitespace.' },
    boneAmber: { name: 'Bone & Amber',      sub: 'Natural-history monograph. IM Fell, foxed parchment, plate engravings, roman folios.' },
  }[dirKey];

  const Cover    = dir.Cover;
  const TOC      = dir.TOC;
  const Reader   = dir.Reader;
  const Glossary = dir.Glossary;

  return (
    <DCSection id={dirKey} title={`${labels.name} — ${dark ? 'Dark' : 'Light'}`}>
      <div style={{
        position:'relative', padding:'18px 28px 12px', maxWidth: 760,
      }}>
        <div style={{
          fontFamily:'"Newsreader", Georgia, serif', fontStyle:'italic', fontSize: 26, color:'#1a1a1a', marginBottom: 4,
        }}>{labels.name}</div>
        <div style={{ fontFamily:'system-ui, sans-serif', fontSize: 13, color:'#555', lineHeight: 1.5 }}>{labels.sub}</div>
        <div style={{ marginTop: 12, display:'flex', gap: 8 }}>
          {['light','dark'].map(m=>(
            <button key={m} onClick={()=>setDark(m==='dark')} style={{
              padding:'6px 14px', borderRadius:99, border:'1px solid #ccc', cursor:'pointer',
              fontSize:11, fontWeight: 600, letterSpacing:'0.06em', textTransform:'uppercase',
              background: (dark === (m==='dark')) ? '#111' : '#fff',
              color: (dark === (m==='dark')) ? '#fff' : '#444',
              fontFamily:'system-ui, sans-serif',
            }}>Toggle {m}</button>
          ))}
        </div>
      </div>

      <DCArtboard id={`${dirKey}-cover`} label="Cover" width={402} height={874}>
        <IOSDevice width={402} height={874} dark={dark}>
          <Cover dark={dark} />
        </IOSDevice>
      </DCArtboard>

      <DCArtboard id={`${dirKey}-toc`} label="Table of Contents" width={402} height={874}>
        <IOSDevice width={402} height={874} dark={dark}>
          <TOC dark={dark} />
        </IOSDevice>
      </DCArtboard>

      <DCArtboard id={`${dirKey}-reader`} label="Chapter Reader" width={402} height={874}>
        <IOSDevice width={402} height={874} dark={dark}>
          <Reader
            dark={dark}
            settings={settings}
            onTooltip={setActiveTooltip}
            activeTooltip={activeTooltip}
            onTypeMenu={() => setTypeMenuOpen(v=>!v)}
            typeMenuOpen={typeMenuOpen}
          />
        </IOSDevice>
      </DCArtboard>

      <DCArtboard id={`${dirKey}-glossary-tooltip`} label="Glossary tooltip — open" width={402} height={874}>
        <IOSDevice width={402} height={874} dark={dark}>
          <Reader
            dark={dark}
            settings={settings}
            onTooltip={setActiveTooltip2}
            activeTooltip={activeTooltip2}
            onTypeMenu={()=>{}}
            typeMenuOpen={false}
          />
        </IOSDevice>
      </DCArtboard>

      <DCArtboard id={`${dirKey}-glossary`} label="Glossary index" width={402} height={874}>
        <IOSDevice width={402} height={874} dark={dark}>
          <Glossary dark={dark} />
        </IOSDevice>
      </DCArtboard>
    </DCSection>
  );
}

function App() {
  return (
    <DesignCanvas
      title="Project Grendel — Reader UI"
      subtitle="Three aesthetic directions for a literary-thriller webnovel reader. iPhone, light + dark."
    >
      <DirectionGroup dirKey="dossier"   dir={window.DOSSIER_DIR} defaultDark={false} />
      <DirectionGroup dirKey="editorial" dir={window.ED_DIR}      defaultDark={false} />
      <DirectionGroup dirKey="boneAmber" dir={window.BA_DIR}      defaultDark={false} />
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
